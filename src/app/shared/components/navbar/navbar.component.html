<header class="navbar">
    <div class="navbar__container">
        <!-- Logo -->
        <a routerLink="/home" class="navbar__logo">
            <img src="assets/images/logo-imagotipo.png" alt="Angela El Moro - Logo" class="navbar__logo-img" />
        </a>

        <!-- Hamburger button (mobile) -->
        <button class="navbar__toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen"
            aria-label="Abrir menú de navegación">
            <span class="navbar__toggle-icon"></span>
            <span class="navbar__toggle-icon"></span>
            <span class="navbar__toggle-icon"></span>
        </button>

        <!-- Navigation links -->
        <nav class="navbar__nav" [class.navbar__nav--open]="menuOpen" aria-label="Navegación principal">
            <ul class="navbar__list">
                <li class="navbar__item">
                    <a routerLink="/about" routerLinkActive="navbar__link--active" class="navbar__link">Sobre mí</a>
                </li>
                <li class="navbar__item">
                    <a (click)="goToSection('examples-section')" class="navbar__link" style="cursor: pointer;">Servicios</a>
                </li>
                <li class="navbar__item navbar__item--tooltip">
                    <span class="navbar__link navbar__link--disabled">Blog</span>
                    <span class="navbar__tooltip">¡Próximamente!</span>
                </li>
                <li class="navbar__item">
                    <a (click)="goToSection('is-for-me-section')" class="navbar__link" style="cursor: pointer;">Contacto</a>
                </li>
                <li class="navbar__item">
                    <a href="https://calendar.app.google/ZgSqaiEG1GZCHmfA9"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="navbar__link navbar__link--cta">AGENDAR sesión</a>
                </li>
            </ul>
        </nav>
    </div>
</header>
