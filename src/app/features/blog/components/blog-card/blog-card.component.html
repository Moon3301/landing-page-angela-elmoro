<div class="card-wrapper">
    <div class="card-image-box">
        <img [src]="post.image" alt="Blog Thumb" class="card-image">
    </div>
    <div class="card-content">
        <h3 class="card-title">{{ post.title }}</h3>
        <a class="read-more" href="javascript:void(0)">Leer más</a>
    </div>
</div>
